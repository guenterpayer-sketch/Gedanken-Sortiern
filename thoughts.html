<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meine Gedanken — Gedanken-Sortierer</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <a href="index.html" class="back-link" title="Zurück zur Eingabe">←</a>
            <h1>Meine Gedanken</h1>
            <button id="darkModeBtn" title="Dark Mode umschalten">🌙</button>
        </div>

        <div id="offlineBanner" class="offline-banner" hidden>📡 Offline — Gedanken werden zwischengespeichert und später gesendet.</div>

        <div class="input-section">
            <button id="weeklySummaryBtn">📅 Wochenrückblick</button>
            <button id="findPatternsBtn">🔍 Muster erkennen</button>
        </div>
        <div id="mistralInsight" class="mistral-insight" hidden></div>

        <!-- Kategorien als Buttons -->
        <div class="category-list" id="categoryList"></div>

        <div class="thoughts">
            <h2>Sortierte Gedanken</h2>
            <div id="thoughtList"></div>
        </div>
    </div>
    <script src="app.js"></script>

<script>
  // Service Worker registrieren
  if ('serviceWorker' in navigator) {
    let reloadingForUpdate = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (reloadingForUpdate) return;
      reloadingForUpdate = true;
      window.location.reload();
    });

    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then((registration) => {
          console.log('ServiceWorker registriert:', registration.scope);
          registration.update();
          setInterval(() => registration.update(), 60 * 1000);
        })
        .catch((error) => {
          console.error('ServiceWorker-Registrierung fehlgeschlagen:', error);
        });
    });
  }
</script>
	</body>
</html>
