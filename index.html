<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gedanken-Sortierer</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <h1>Gedanken sortieren</h1>
            <button id="darkModeBtn" title="Dark Mode umschalten">🌙</button>
        </div>
        <div id="appVersion" style="text-align:center; font-size:11px; color:#999; margin-top:-12px; margin-bottom:8px;">Build v12</div>

        <div id="offlineBanner" class="offline-banner" hidden>📡 Offline — Gedanken werden zwischengespeichert und später gesendet.</div>
        <div id="reminderBanner" class="reminder-banner" hidden>
            <span id="reminderBannerText"></span>
            <button id="reminderBannerCloseBtn" type="button">Verstanden</button>
        </div>

        <div class="input-section">
            <input type="text" id="thoughtInput" placeholder="Gedanken eingeben...">
            <button id="addThoughtBtn">Hinzufügen</button>
            <button id="speechBtn">🎤 Sprache</button>
        </div>
        <div class="input-section reminder-row">
            <label for="reminderInput">⏰ Erinnerung (optional):</label>
            <input type="datetime-local" id="reminderInput">
        </div>
        <div class="input-section">
            <button id="checkRemindersBtn">🔔 Erinnerungen jetzt prüfen (Test)</button>
        </div>

        <div class="input-section">
            <button id="weeklySummaryBtn">📅 Wochenrückblick</button>
            <button id="findPatternsBtn">🔍 Muster erkennen</button>
        </div>
        <div id="mistralInsight" class="mistral-insight" hidden></div>

        <!-- Kategorien als Buttons -->
        <div class="category-list" id="categoryList"></div>

        <div class="thoughts">
            <h2>Sortierte Gedanken</h2>
            <div id="thoughtList"></div>
        </div>
    </div>
    <script src="app.js"></script>

<script>
  // Service Worker registrieren
  if ('serviceWorker' in navigator) {
    // Sobald ein neuer Service Worker die Kontrolle übernimmt (z.B. weil
    // eine neue Version hochgeladen wurde), lädt die Seite automatisch neu,
    // damit eine bereits offene App-Instanz nicht mit veraltetem JS weiterläuft.
    let reloadingForUpdate = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (reloadingForUpdate) return;
      reloadingForUpdate = true;
      window.location.reload();
    });

    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then((registration) => {
          console.log('ServiceWorker registriert:', registration.scope);
          // Beim Start aktiv nach einer neueren Version suchen.
          registration.update();
          setInterval(() => registration.update(), 60 * 1000);
        })
        .catch((error) => {
          console.error('ServiceWorker-Registrierung fehlgeschlagen:', error);
        });
    });
  }
</script>
	</body>
</html>
