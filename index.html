<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gedanken-Sortierer</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container home-container">
        <div class="top-bar">
            <h1>Gedanken sortieren</h1>
            <button id="darkModeBtn" title="Dark Mode umschalten">🌙</button>
        </div>

        <div id="offlineBanner" class="offline-banner" hidden>📡 Offline — Gedanken werden zwischengespeichert und später gesendet.</div>

        <form id="thoughtForm" class="home-input-area">
            <input type="text" id="thoughtInput" placeholder="Gedanken eingeben..." autocomplete="off">
            <button type="submit" id="addThoughtBtn">Absenden</button>
        </form>
        <div id="addStatus" class="add-status" hidden></div>

        <div class="home-spacer home-spacer-top"></div>

        <div class="home-mic-area">
            <button type="button" id="speechBtn" class="mic-btn" title="Sprache eingeben">🎤</button>
        </div>

        <div class="home-spacer home-spacer-bottom"></div>

        <a href="thoughts.html" class="thoughts-link">📋 Meine Gedanken ansehen</a>
    </div>
    <script src="app.js"></script>

<script>
  // Service Worker registrieren
  if ('serviceWorker' in navigator) {
    // Sobald ein neuer Service Worker die Kontrolle übernimmt (z.B. weil
    // eine neue Version hochgeladen wurde), lädt die Seite automatisch neu,
    // damit eine bereits offene App-Instanz nicht mit veraltetem JS weiterläuft.
    let reloadingForUpdate = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (reloadingForUpdate) return;
      reloadingForUpdate = true;
      window.location.reload();
    });

    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js')
        .then((registration) => {
          console.log('ServiceWorker registriert:', registration.scope);
          // Beim Start aktiv nach einer neueren Version suchen.
          registration.update();
          setInterval(() => registration.update(), 60 * 1000);
        })
        .catch((error) => {
          console.error('ServiceWorker-Registrierung fehlgeschlagen:', error);
        });
    });
  }
</script>
	</body>
</html>
